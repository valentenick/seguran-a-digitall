<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de senhas</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<main class="container">


    <section class="cabecalho">

        <div class="icone">🔒</div>

        <h1>Gerador de senhas</h1>

        <p>
        Gere instantaneamente uma senha aleatória e segura
        </p>

    </section>



    <section class="senha">

        <small>Senha</small>

        <h2>zcBLSNGXabce</h2>

    </section>




    <h3 class="titulo">
        Personalize sua senha
    </h3>




    <div class="conteudo">



        <div class="caracteres">

            <h4>Número de caracteres</h4>


            <div class="contador">

                <button>-</button>

                <span>12</span>

                <button>+</button>

            </div>


        </div>





        <div class="opcoes">


            <h4>Características da senha</h4>


            <label>
                <input type="checkbox" checked>
                Letras maiúsculas
            </label>


            <label>
                <input type="checkbox" checked>
                Letras minúsculas
            </label>


            <label>
                <input type="checkbox">
                Números
            </label>


            <label>
                <input type="checkbox">
                Símbolos
            </label>



        </div>





        <div class="forca">


            <h4>Força da senha</h4>


            <div class="barra">

                <div class="nivel"></div>

            </div>


            <div class="palavras">

                <span>Fraca</span>
                <span>Média</span>
                <span>Forte</span>

            </div>


        </div>




    </div>


</main>



</body>

</html>
