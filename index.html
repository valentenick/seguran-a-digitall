<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personalize sua senha</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <h2>Personalize sua senha</h2>


    <div class="conteudo">


        <div class="numero">

            <h3>Número de caracteres</h3>

            <div class="contador">

                <button>-</button>

                <span>12</span>

                <button>+</button>

            </div>

        </div>



        <div class="opcoes">


            <h3>Características da senha</h3>


            <label>
                <input type="checkbox" checked>
                Letras maiúsculas
            </label>


            <label>
                <input type="checkbox" checked>
                Letras minúsculas
            </label>


            <label>
                <input type="checkbox">
                Números
            </label>


            <label>
                <input type="checkbox">
                Símbolos
            </label>


        </div>




        <div class="forca">


            <h3>Força da senha</h3>


            <div class="barra">

                <div class="nivel"></div>

            </div>


            <div class="texto">

                <span>Fraca</span>
                <span>Média</span>
                <span>Forte</span>

            </div>


        </div>


    </div>


</div>



</body>

</html>
